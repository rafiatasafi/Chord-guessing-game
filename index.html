<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chord Quest - Retro Ear Training Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Righteous&display=swap" rel="stylesheet">
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Fredoka', sans-serif;
        background: linear-gradient(135deg, #f4e4d7 0%, #e8d5c4 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        position: relative;
        overflow-x: hidden;
    }

    body::before {
        content: '♪ ♫ ♩ ♬';
        position: absolute;
        top: 10%;
        left: 5%;
        font-size: 3em;
        color: rgba(209, 152, 169, 0.15);
        animation: float 20s infinite;
    }

    body::after {
        content: '♪ ♫ ♩ ♬';
        position: absolute;
        bottom: 10%;
        right: 5%;
        font-size: 3em;
        color: rgba(176, 137, 198, 0.15);
        animation: float 25s infinite reverse;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-30px) rotate(10deg); }
    }

    .game-container {
        background: #fff;
        border-radius: 30px;
        padding: 50px;
        max-width: 800px;
        width: 100%;
        box-shadow: 
            0 20px 60px rgba(176, 137, 198, 0.3),
            0 0 0 10px rgba(255, 255, 255, 0.5),
            0 0 0 20px rgba(176, 137, 198, 0.1);
        position: relative;
    }

    .game-container::before,
    .game-container::after {
        content: '';
        position: absolute;
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, #d198a9 0%, #b089c6 100%);
        border-radius: 50%;
    }

    .game-container::before {
        top: -10px;
        left: -10px;
    }

    .game-container::after {
        bottom: -10px;
        right: -10px;
    }

    h1 {
        font-family: 'Righteous', cursive;
        text-align: center;
        background: linear-gradient(135deg, #d198a9 0%, #b089c6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 10px;
        font-size: 3em;
        text-shadow: 2px 2px 4px rgba(176, 137, 198, 0.2);
    }

    h2 {
        text-align: center;
        color: #8b7c9e;
        margin-bottom: 20px;
        font-size: 1.3em;
        font-weight: 400;
    }

    .start-screen {
        text-align: center;
        animation: fadeIn 0.5s;
    }

    .start-screen .character {
        width: 200px;
        height: 200px;
        margin: 30px auto;
        animation: bounce 2s infinite;
    }

    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
    }

    .difficulty-title {
        font-size: 1.8em;
        color: #b089c6;
        margin-bottom: 30px;
        font-weight: 600;
    }

    .difficulty-buttons {
        display: flex;
        gap: 30px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .difficulty-btn {
        background: linear-gradient(135deg, #d198a9 0%, #b089c6 100%);
        color: white;
        border: none;
        padding: 30px 50px;
        font-size: 1.5em;
        border-radius: 20px;
        cursor: pointer;
        font-family: 'Fredoka', sans-serif;
        font-weight: 600;
        box-shadow: 
            0 8px 0 #9077a8,
            0 12px 20px rgba(176, 137, 198, 0.4);
        transition: all 0.2s;
        position: relative;
        overflow: hidden;
    }

    .difficulty-btn:hover {
        transform: translateY(-5px);
        box-shadow: 
            0 13px 0 #9077a8,
            0 17px 25px rgba(176, 137, 198, 0.5);
    }

    .difficulty-btn:active {
        transform: translateY(5px);
        box-shadow: 
            0 3px 0 #9077a8,
            0 7px 15px rgba(176, 137, 198, 0.3);
    }

    .difficulty-subtitle {
        display: block;
        font-size: 0.6em;
        opacity: 0.9;
        margin-top: 5px;
        font-weight: 400;
    }

    .back-button {
        position: absolute;
        top: 20px;
        left: 20px;
        background: linear-gradient(135deg, #8b7c9e 0%, #6d5f7a 100%);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 20px;
        cursor: pointer;
        font-family: 'Fredoka', sans-serif;
        font-weight: 600;
        font-size: 0.9em;
        box-shadow: 
            0 4px 0 #5a4d66,
            0 7px 14px rgba(139, 124, 158, 0.4);
        transition: all 0.2s;
    }

    .back-button:hover {
        transform: translateY(-2px);
        box-shadow: 
            0 6px 0 #5a4d66,
            0 9px 18px rgba(139, 124, 158, 0.5);
    }

    .character-container {
        text-align: center;
        margin: 20px 0;
    }

    .character {
        width: 150px;
        height: 150px;
        object-fit: contain;
        transition: all 0.3s ease;
        filter: drop-shadow(0 5px 10px rgba(176, 137, 198, 0.3));
    }

    .character:hover {
        transform: scale(1.05);
    }

    .character-message {
        margin-top: 10px;
        font-size: 1.1em;
        color: #8b7c9e;
        font-weight: 600;
        min-height: 30px;
        background: linear-gradient(135deg, rgba(209, 152, 169, 0.1) 0%, rgba(176, 137, 198, 0.1) 100%);
        padding: 15px;
        border-radius: 15px;
        border: 2px solid rgba(176, 137, 198, 0.2);
    }

    .character.bounce-anim {
        animation: bounce 0.6s;
    }

    .score-container {
        background: linear-gradient(135deg, rgba(209, 152, 169, 0.15) 0%, rgba(176, 137, 198, 0.15) 100%);
        padding: 20px;
        border-radius: 20px;
        margin-bottom: 20px;
        border: 3px solid rgba(176, 137, 198, 0.3);
    }

    .score {
        text-align: center;
        font-size: 1.5em;
        color: #8b7c9e;
        margin-bottom: 10px;
        font-weight: 600;
    }

    .score span {
        color: #d198a9;
        font-weight: 700;
        font-size: 1.2em;
    }

    .tries-left {
        text-align: center;
        font-size: 1.2em;
        color: #d67a8a;
        margin-bottom: 10px;
        font-weight: 600;
    }

    .accuracy {
        text-align: center;
        color: #b089c6;
        font-size: 1.1em;
        font-weight: 600;
    }

    .difficulty-badge {
        display: inline-block;
        background: linear-gradient(135deg, #d198a9 0%, #b089c6 100%);
        color: white;
        padding: 8px 20px;
        border-radius: 20px;
        font-size: 0.9em;
        margin-top: 10px;
        font-weight: 600;
    }

    .play-section {
        text-align: center;
        margin-bottom: 40px;
        display: flex;
        gap: 15px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .play-button {
        background: linear-gradient(135deg, #91c9a8 0%, #6fb890 100%);
        color: white;
        border: none;
        padding: 20px 50px;
        font-size: 1.4em;
        border-radius: 50px;
        cursor: pointer;
        font-family: 'Fredoka', sans-serif;
        font-weight: 600;
        box-shadow: 
            0 6px 0 #5a9c78,
            0 10px 20px rgba(111, 184, 144, 0.4);
        transition: all 0.2s;
    }

    .play-button:hover:not(:disabled) {
        transform: translateY(-3px);
        box-shadow: 
            0 9px 0 #5a9c78,
            0 13px 25px rgba(111, 184, 144, 0.5);
    }

    .play-button:active:not(:disabled) {
        transform: translateY(3px);
        box-shadow: 
            0 3px 0 #5a9c78,
            0 7px 15px rgba(111, 184, 144, 0.3);
    }

    .play-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .reset-button {
        background: linear-gradient(135deg, #e89ba8 0%, #d67a8a 100%);
        color: white;
        border: none;
        padding: 15px 35px;
        font-size: 1.2em;
        border-radius: 50px;
        cursor: pointer;
        font-family: 'Fredoka', sans-serif;
        font-weight: 600;
        box-shadow: 
            0 5px 0 #b85f6f,
            0 9px 18px rgba(214, 122, 138, 0.4);
        transition: all 0.2s;
    }

    .reset-button:hover {
        transform: translateY(-2px);
        box-shadow: 
            0 7px 0 #b85f6f,
            0 11px 22px rgba(214, 122, 138, 0.5);
    }

    .guess-section {
        margin-bottom: 30px;
    }

    .section-title {
        font-size: 1.3em;
        color: #8b7c9e;
        margin-bottom: 20px;
        font-weight: 600;
        text-align: center;
    }

    .chord-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
    }

    .chord-btn {
        padding: 20px;
        border: 3px solid #e8d5c4;
        background: white;
        border-radius: 15px;
        cursor: pointer;
        transition: all 0.3s;
        font-size: 1.2em;
        font-weight: 600;
        color: #8b7c9e;
        font-family: 'Fredoka', sans-serif;
        box-shadow: 0 4px 0 #e8d5c4;
        position: relative;
    }

    .chord-btn:hover:not(:disabled) {
        border-color: #d198a9;
        background: linear-gradient(135deg, rgba(209, 152, 169, 0.1) 0%, rgba(176, 137, 198, 0.1) 100%);
        transform: translateY(-3px);
        box-shadow: 0 7px 0 #e8d5c4;
    }

    .chord-btn.correct {
        background: linear-gradient(135deg, #91c9a8 0%, #6fb890 100%);
        color: white;
        border-color: #6fb890;
        animation: correctPulse 0.5s;
    }

    .chord-btn.incorrect {
        background: linear-gradient(135deg, #e89ba8 0%, #d67a8a 100%);
        color: white;
        border-color: #d67a8a;
        animation: shake 0.5s;
    }

    .chord-btn:disabled {
        cursor: not-allowed;
        opacity: 0.7;
    }

    @keyframes correctPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-8px); }
        75% { transform: translateX(8px); }
    }

    .feedback {
        margin-top: 25px;
        padding: 25px;
        border-radius: 20px;
        text-align: center;
        font-weight: 600;
        font-size: 1.1em;
        animation: fadeIn 0.3s;
        border: 3px solid;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .feedback.correct {
        background: linear-gradient(135deg, rgba(145, 201, 168, 0.2) 0%, rgba(111, 184, 144, 0.2) 100%);
        color: #5a9c78;
        border-color: #91c9a8;
    }

    .feedback.incorrect {
        background: linear-gradient(135deg, rgba(232, 155, 168, 0.2) 0%, rgba(214, 122, 138, 0.2) 100%);
        color: #b85f6f;
        border-color: #e89ba8;
    }

    .next-btn {
        background: linear-gradient(135deg, #d198a9 0%, #b089c6 100%);
        color: white;
        border: none;
        padding: 18px 40px;
        border-radius: 15px;
        cursor: pointer;
        font-size: 1.2em;
        font-weight: 600;
        font-family: 'Fredoka', sans-serif;
        width: 100%;
        margin-top: 15px;
        box-shadow: 
            0 5px 0 #9077a8,
            0 9px 18px rgba(176, 137, 198, 0.4);
        transition: all 0.2s;
    }

    .next-btn:hover {
        transform: translateY(-2px);
        box-shadow: 
            0 7px 0 #9077a8,
            0 11px 22px rgba(176, 137, 198, 0.5);
    }

    #gameOverContainer {
        margin-top: 30px;
        padding: 40px;
        background: linear-gradient(135deg, rgba(209, 152, 169, 0.15) 0%, rgba(176, 137, 198, 0.15) 100%);
        border-radius: 25px;
        text-align: center;
        border: 3px solid rgba(176, 137, 198, 0.3);
    }

    #gameOverContainer h2 {
        color: #d198a9;
        margin-bottom: 20px;
        font-size: 2.5em;
        font-family: 'Righteous', cursive;
    }

    #gameOverContainer p {
        font-size: 1.3em;
        color: #8b7c9e;
        margin-bottom: 15px;
        font-weight: 600;
    }

    .hidden {
        display: none;
    }

    @media (max-width: 600px) {
        .chord-grid {
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        h1 {
            font-size: 2em;
        }
        
        .game-container {
            padding: 30px;
        }
        
        .difficulty-buttons {
            flex-direction: column;
            gap: 20px;
        }
        
        .difficulty-btn {
            width: 100%;
        }
    }
    </style>
</head>
<body>
    <!-- Start Screen -->
    <div class="game-container" id="startScreen">
        <h1>🎸 Chord Quest</h1>
        <h2>Retro Ear Training Adventure</h2>
        
        <div class="start-screen">
            <img src="images/happy.png" alt="Character" class="character">
            <div class="difficulty-title">Choose Your Challenge!</div>
            <div class="difficulty-buttons">
                <button class="difficulty-btn">
                    🎵 Easy Mode
                    <span class="difficulty-subtitle">Major Chords Only</span>
                </button>
                <button class="difficulty-btn">
                    🎸 Hard Mode
                    <span class="difficulty-subtitle">Major + Minor Chords</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div class="game-container hidden" id="gameScreen">
        <button class="back-button" id="backBtn">← Back to Menu</button>

        <h1>🎸 Chord Quest</h1>
        <h2>Test your ear's power!</h2>
        
        <div class="character-container">
            <img id="characterImg" src="images/happy.png" alt="Character" class="character">
            <div id="characterMessage" class="character-message">Ready to play!</div>
        </div>

        <div class="score-container">
            <div class="score">
                Score: <span id="correct">0</span> / <span id="total">20</span>
            </div>
            <div class="tries-left" id="triesLeft">Tries Left: 20</div>
            <div class="accuracy" id="accuracy"></div>
            <div class="difficulty-badge" id="difficultyBadge">Easy Mode</div>
        </div>

        <div class="play-section">
            <button class="play-button" id="playBtn">🎵 Play Chord</button>
            <button class="reset-button" id="resetBtn">🔄 Reset Score</button>
        </div>

        <div class="guess-section">
            <div class="section-title">Select the chord you hear:</div>
            <div class="chord-grid" id="chordGrid"></div>
        </div>

        <div id="feedbackContainer"></div>
        <div id="gameOverContainer" class="hidden"></div>
    </div>

    <!-- Load Modules -->
    <script src="js/audio.js"></script>
    <script src="js/hints.js"></script>
    <script src="js/game.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
